<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vaultGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6ef5"/>
      <stop offset="100%" stop-color="#0d3fa6"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a7aff"/>
      <stop offset="100%" stop-color="#1254cc"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5fa0ff"/>
      <stop offset="100%" stop-color="#1a50c0"/>
    </linearGradient>
  </defs>

  <!-- Outer body -->
  <rect x="120" y="100" width="440" height="480" rx="48" fill="url(#vaultGrad)"/>

  <!-- Inner body sheen -->
  <rect x="140" y="120" width="400" height="440" rx="36" fill="none" stroke="#4a90ff" stroke-width="2" opacity="0.4"/>

  <!-- Vault door panel -->
  <rect x="170" y="150" width="340" height="380" rx="28" fill="url(#doorGrad)" stroke="#5ba0ff" stroke-width="2.5"/>

  <!-- Door bolts - corners -->
  <circle cx="215" cy="195" r="18" fill="#0a2d85" stroke="#4a80e0" stroke-width="2"/>
  <circle cx="215" cy="195" r="10" fill="#1a50c8" stroke="#6090f0" stroke-width="1.5"/>
  <circle cx="465" cy="195" r="18" fill="#0a2d85" stroke="#4a80e0" stroke-width="2"/>
  <circle cx="465" cy="195" r="10" fill="#1a50c8" stroke="#6090f0" stroke-width="1.5"/>
  <circle cx="215" cy="485" r="18" fill="#0a2d85" stroke="#4a80e0" stroke-width="2"/>
  <circle cx="215" cy="485" r="10" fill="#1a50c8" stroke="#6090f0" stroke-width="1.5"/>
  <circle cx="465" cy="485" r="18" fill="#0a2d85" stroke="#4a80e0" stroke-width="2"/>
  <circle cx="465" cy="485" r="10" fill="#1a50c8" stroke="#6090f0" stroke-width="1.5"/>

  <!-- Central wheel rim -->
  <circle cx="340" cy="340" r="90" fill="#0a2d85" stroke="#3a70d8" stroke-width="3"/>
  <circle cx="340" cy="340" r="76" fill="url(#rimGrad)" stroke="#5a90ff" stroke-width="2"/>
  <circle cx="340" cy="340" r="58" fill="#0d3580" stroke="#3060c0" stroke-width="2"/>

  <!-- Wheel spokes -->
  <line x1="340" y1="264" x2="340" y2="416" stroke="#6aacff" stroke-width="5" stroke-linecap="round"/>
  <line x1="264" y1="340" x2="416" y2="340" stroke="#6aacff" stroke-width="5" stroke-linecap="round"/>
  <line x1="286" y1="286" x2="394" y2="394" stroke="#6aacff" stroke-width="5" stroke-linecap="round"/>
  <line x1="394" y1="286" x2="286" y2="394" stroke="#6aacff" stroke-width="5" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="340" cy="340" r="20" fill="#1a60f0" stroke="#80bfff" stroke-width="2.5"/>
  <circle cx="340" cy="340" r="9" fill="#5aaaff" stroke="#a0d0ff" stroke-width="1.5"/>

  <!-- Candlestick bars -->
  <rect x="296" y="325" width="8" height="22" rx="2" fill="#00e5a0" opacity="0.85"/>
  <line x1="300" y1="320" x2="300" y2="325" stroke="#00e5a0" stroke-width="2" opacity="0.85"/>
  <line x1="300" y1="347" x2="300" y2="352" stroke="#00e5a0" stroke-width="2" opacity="0.85"/>
  <rect x="311" y="318" width="8" height="28" rx="2" fill="#ff5f6d" opacity="0.85"/>
  <line x1="315" y1="312" x2="315" y2="318" stroke="#ff5f6d" stroke-width="2" opacity="0.85"/>
  <line x1="315" y1="346" x2="315" y2="354" stroke="#ff5f6d" stroke-width="2" opacity="0.85"/>
  <rect x="326" y="310" width="8" height="26" rx="2" fill="#00e5a0" opacity="0.85"/>
  <line x1="330" y1="304" x2="330" y2="310" stroke="#00e5a0" stroke-width="2" opacity="0.85"/>
  <line x1="330" y1="336" x2="330" y2="342" stroke="#00e5a0" stroke-width="2" opacity="0.85"/>
  <rect x="341" y="322" width="8" height="18" rx="2" fill="#00e5a0" opacity="0.85"/>
  <line x1="345" y1="317" x2="345" y2="322" stroke="#00e5a0" stroke-width="2" opacity="0.85"/>
  <line x1="345" y1="340" x2="345" y2="344" stroke="#00e5a0" stroke-width="2" opacity="0.85"/>
  <rect x="356" y="314" width="8" height="30" rx="2" fill="#ff5f6d" opacity="0.85"/>
  <line x1="360" y1="308" x2="360" y2="314" stroke="#ff5f6d" stroke-width="2" opacity="0.85"/>
  <line x1="360" y1="344" x2="360" y2="350" stroke="#ff5f6d" stroke-width="2" opacity="0.85"/>

  <!-- Handle bar -->
  <rect x="455" y="320" width="30" height="40" rx="15" fill="#1a50c8" stroke="#5a90ff" stroke-width="2.5"/>

  <!-- Keyhole -->
  <circle cx="340" cy="440" r="11" fill="#0a2060" stroke="#3060c0" stroke-width="2"/>
  <rect x="335" y="450" width="10" height="16" rx="3" fill="#0a2060" stroke="#3060c0" stroke-width="2"/>
</svg>
